services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: datapulse-db
    environment:
      POSTGRES_USER: datapulse
      POSTGRES_PASSWORD: datapulse123
      POSTGRES_DB: datapulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datapulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: datapulse-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@datapulse.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  # DataPulse Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datapulse-backend
    environment:
      DATABASE_URL: postgresql://datapulse:datapulse123@db:5432/datapulse
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Data Engineering Pipeline
  pipeline:
    build:
      context: .
      dockerfile: devops/Dockerfile.pipeline
    container_name: datapulse-pipeline
    environment:
      SOURCE_DB_URL: postgresql://datapulse:datapulse123@db:5432/datapulse
      TARGET_DB_URL: postgresql://datapulse:datapulse123@db:5432/datapulse
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy

  # Prometheus for Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: datapulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  # Grafana for Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: datapulse-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning

  # Loki for Log Aggregation
  loki:
    image: grafana/loki:2.9.2
    container_name: datapulse-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki
    command:
      - -config.file=/etc/loki/loki-config.yml
    user: "root"

  # Promtail for Log Shipping
  promtail:
    image: grafana/promtail:2.9.2
    container_name: datapulse-promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki

volumes:
  postgres_data:
  pgadmin_data:
  prometheus_data:
  grafana_data:
  loki_data:
