services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: datapulse-db
    environment:
      POSTGRES_USER: datapulse
      POSTGRES_PASSWORD: datapulse123
      POSTGRES_DB: datapulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datapulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: datapulse-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@datapulse.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  # DataPulse Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datapulse-backend
    environment:
      DATABASE_URL: postgresql://datapulse:datapulse123@db:5432/datapulse
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Data Engineering Pipeline
  pipeline:
    build:
      context: .
      dockerfile: devops/Dockerfile.pipeline
    container_name: datapulse-pipeline
    environment:
      SOURCE_DB_URL: postgresql://datapulse:datapulse123@db:5432/datapulse
      TARGET_DB_URL: postgresql://datapulse:datapulse123@db:5432/datapulse
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy

  # Airflow bootstrap (run once before scheduler/webserver)
  airflow-init:
    image: apache/airflow:2.9.3-python3.11
    profiles: ["de"]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://datapulse:datapulse123@db:5432/datapulse
      SOURCE_DB_URL: postgresql://datapulse:datapulse123@db:5432/datapulse
      TARGET_DB_URL: postgresql://datapulse:datapulse123@db:5432/datapulse
      DE_ALERT_EMAILS: ""
      SLACK_WEBHOOK_URL: ""
      _PIP_ADDITIONAL_REQUIREMENTS: "psycopg2-binary==2.9.9 pandas==2.1.4 python-dotenv==1.0.1"
    user: "50000:0"
    volumes:
      - ./data-engineering/pipeline:/opt/airflow/dags/pipeline
      - airflow_logs:/opt/airflow/logs
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --firstname Data --lastname Engineer --role Admin --email admin@datapulse.local --password admin || true"

  # Airflow web UI for DE monitoring
  airflow-webserver:
    image: apache/airflow:2.9.3-python3.11
    profiles: ["de"]
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://datapulse:datapulse123@db:5432/datapulse
      SOURCE_DB_URL: postgresql://datapulse:datapulse123@db:5432/datapulse
      TARGET_DB_URL: postgresql://datapulse:datapulse123@db:5432/datapulse
      DE_ALERT_EMAILS: ""
      SLACK_WEBHOOK_URL: ""
      _PIP_ADDITIONAL_REQUIREMENTS: "psycopg2-binary==2.9.9 pandas==2.1.4 python-dotenv==1.0.1"
    user: "50000:0"
    volumes:
      - ./data-engineering/pipeline:/opt/airflow/dags/pipeline
      - airflow_logs:/opt/airflow/logs
    depends_on:
      db:
        condition: service_healthy
    command: webserver

  # Airflow scheduler for DAG execution
  airflow-scheduler:
    image: apache/airflow:2.9.3-python3.11
    profiles: ["de"]
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://datapulse:datapulse123@db:5432/datapulse
      SOURCE_DB_URL: postgresql://datapulse:datapulse123@db:5432/datapulse
      TARGET_DB_URL: postgresql://datapulse:datapulse123@db:5432/datapulse
      DE_ALERT_EMAILS: ""
      SLACK_WEBHOOK_URL: ""
      _PIP_ADDITIONAL_REQUIREMENTS: "psycopg2-binary==2.9.9 pandas==2.1.4 python-dotenv==1.0.1"
    user: "50000:0"
    volumes:
      - ./data-engineering/pipeline:/opt/airflow/dags/pipeline
      - airflow_logs:/opt/airflow/logs
    depends_on:
      db:
        condition: service_healthy
    command: scheduler

  # Prometheus for Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: datapulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - backend

  # Grafana for Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: datapulse-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  postgres_data:
  pgadmin_data:
  prometheus_data:
  grafana_data:
  airflow_logs:
