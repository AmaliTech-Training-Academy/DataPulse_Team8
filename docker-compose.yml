services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: datapulse-db
    environment:
      POSTGRES_USER: datapulse
      POSTGRES_PASSWORD: datapulse123
      POSTGRES_DB: datapulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datapulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: datapulse-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@datapulse.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  # DataPulse API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datapulse-api
    environment:
      DATABASE_URL: postgresql://datapulse:datapulse123@postgres:5432/datapulse
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  pgadmin_data:
