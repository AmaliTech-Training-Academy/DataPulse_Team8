services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: datapulse-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-time analytics schema bootstrap for Streamlit tables/views
  analytics-init:
    image: postgres:15-alpine
    container_name: datapulse-analytics-init
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data-engineering/sql:/sql:ro
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} -f /sql/analytics_schema.sql &&
      psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} -f /sql/seed_dim_date.sql"
    restart: "no"

  # PgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: datapulse-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  # DataPulse Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datapulse-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # DataPulse Frontend UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: datapulse-frontend
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy

  # Data Engineering Pipeline
  pipeline:
    profiles: ["manual"]
    build:
      context: .
      dockerfile: devops/Dockerfile.pipeline
    container_name: datapulse-pipeline
    environment:
      SOURCE_DB_URL: ${SOURCE_DB_URL}
      TARGET_DB_URL: ${TARGET_DB_URL}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
      analytics-init:
        condition: service_completed_successfully

  # Airflow bootstrap (run once before scheduler/webserver)
  airflow-init:
    image: apache/airflow:2.9.3-python3.11
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_URL}
      SOURCE_DB_URL: ${SOURCE_DB_URL}
      TARGET_DB_URL: ${TARGET_DB_URL}
      DE_ALERT_EMAILS: ${DE_ALERT_EMAILS}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      _PIP_ADDITIONAL_REQUIREMENTS: "psycopg2-binary==2.9.9 pandas==2.1.4 python-dotenv==1.0.1"
    user: "50000:0"
    volumes:
      - ./data-engineering/pipeline:/opt/airflow/dags/pipeline
      - airflow_logs:/opt/airflow/logs
    depends_on:
      db:
        condition: service_healthy
      analytics-init:
        condition: service_completed_successfully
    command: >
      bash -c "airflow db migrate &&
      (airflow users create --username admin --firstname Data --lastname Engineer --role Admin --email admin@datapulse.local --password ${AIRFLOW_ADMIN_PASSWORD} || true) &&
      (airflow dags unpause quality_metrics_etl_on_upload || true)"

  # Airflow web UI for DE monitoring
  airflow-webserver:
    image: apache/airflow:2.9.3-python3.11
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_URL}
      SOURCE_DB_URL: ${SOURCE_DB_URL}
      TARGET_DB_URL: ${TARGET_DB_URL}
      DE_ALERT_EMAILS: ${DE_ALERT_EMAILS}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      _PIP_ADDITIONAL_REQUIREMENTS: "psycopg2-binary==2.9.9 pandas==2.1.4 python-dotenv==1.0.1"
    user: "50000:0"
    volumes:
      - ./data-engineering/pipeline:/opt/airflow/dags/pipeline
      - airflow_logs:/opt/airflow/logs
    depends_on:
      db:
        condition: service_healthy
      analytics-init:
        condition: service_completed_successfully
      airflow-init:
        condition: service_completed_successfully
    command: webserver

  # Airflow scheduler for DAG execution
  airflow-scheduler:
    image: apache/airflow:2.9.3-python3.11
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_URL}
      SOURCE_DB_URL: ${SOURCE_DB_URL}
      TARGET_DB_URL: ${TARGET_DB_URL}
      DE_ALERT_EMAILS: ${DE_ALERT_EMAILS}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      _PIP_ADDITIONAL_REQUIREMENTS: "psycopg2-binary==2.9.9 pandas==2.1.4 python-dotenv==1.0.1"
    user: "50000:0"
    volumes:
      - ./data-engineering/pipeline:/opt/airflow/dags/pipeline
      - airflow_logs:/opt/airflow/logs
    depends_on:
      db:
        condition: service_healthy
      analytics-init:
        condition: service_completed_successfully
      airflow-init:
        condition: service_completed_successfully
    command: scheduler

  # Prometheus for Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: datapulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - backend

  # Grafana for Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: datapulse-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  # Streamlit Analytics Dashboard
  dashboard:
    build:
      context: ./data-engineering/dashboards
      dockerfile: Dockerfile
    container_name: datapulse-dashboard
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
      analytics-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  pgadmin_data:
  prometheus_data:
  grafana_data:
  airflow_logs:
