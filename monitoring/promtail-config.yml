server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://datapulse-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: datapulse-logs
    # Only scrape logs from DataPulse containers
    pipeline_stages:
      - match:
          selector: '{container_name=~"datapulse.*"}'
    static_configs:
      - targets:
          - localhost
        labels:
          job: datapulse-logs
          __path__: /var/lib/docker/containers/*/*-json.log
