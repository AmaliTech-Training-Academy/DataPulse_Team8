services:
  postgres_test:
    image: postgres:15-alpine
    container_name: datapulse-db-test
    environment:
      POSTGRES_USER: datapulse_test
      POSTGRES_PASSWORD: datapulse_test_pass
      POSTGRES_DB: datapulse_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datapulse_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  api_test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datapulse-api-test
    environment:
      TEST_DATABASE_URL: postgresql://datapulse_test:datapulse_test_pass@postgres_test:5432/datapulse_test
      APP_ENV: test
    depends_on:
      postgres_test:
        condition: service_healthy
    command: pytest tests/ -v
