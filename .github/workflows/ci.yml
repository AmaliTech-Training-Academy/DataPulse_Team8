# =============================================================================
# DataPulse CI/CD Pipeline
# =============================================================================
# Runs on every push to feature/* branches and PRs to main
# Pipeline: flake8 linting → pytest tests → docker build
# Target completion: under 5 minutes
# =============================================================================

name: CI

# Trigger on feature branches and PRs to main and developer
on:
  push:
    branches: [main, developer, develop, "feature/*", "devops/*"]
  pull_request:
    branches: [main, developer]

# =============================================================================
# Jobs
# =============================================================================
jobs:
  # -------------------------------------------------------------------------
  # Lint (flake8)
  # -------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 backend/app/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # -------------------------------------------------------------------------
  # Test (pytest)
  # -------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: datapulse_user
          POSTGRES_PASSWORD: datapulse_pass
          POSTGRES_DB: datapulse_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run pytest
        run: pytest backend/tests/ -v --junitxml=test-results.xml
        env:
          DATABASE_URL: postgresql://datapulse_user:datapulse_pass@localhost:5432/datapulse_db_test
          TEST_DATABASE_URL: postgresql://datapulse_user:datapulse_pass@localhost:5432/datapulse_db_test
          APP_ENV: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # -------------------------------------------------------------------------
  # Build Docker Image
  # -------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: datapulse-api:latest

      - name: Run container health check
        run: |
          docker run -d --name test-api datapulse-api:latest
          sleep 5
          docker logs test-api
          docker stop test-api || true
