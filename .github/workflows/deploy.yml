name: Deploy to ECR with Blue-Green

on:
  # Only run manually - use deploy-ecs.yml for automatic deployments
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - dev
          - staging
          - production

env:
  AWS_REGION: us-east-1
  # OIDC Role ARN - replace with your actual role ARN from Terraform output
  # Format: arn:aws:iam::ACCOUNT_ID:role/github-actions-deploy-ENVIRONMENT
  GITHUB_OIDC_ROLE: ${{ secrets.GITHUB_OIDC_ROLE_ARN }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  # Build and push Docker images to ECR
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC: Authenticate to AWS using OIDC (no credentials needed)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.GITHUB_OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ECR_REGISTRY }}/datapulse-backend
            ${{ env.ECR_REGISTRY }}/datapulse-pipeline
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=${{ github.sha }},enable={{is_default_branch}}

      - name: Build and push Backend API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.ECR_REGISTRY }}/datapulse-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Pipeline ETL
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./devops/Dockerfile.pipeline
          push: true
          tags: ${{ env.ECR_REGISTRY }}/datapulse-pipeline:${{ github.sha }}

  # Blue Environment Deployment (Staging)
  deploy-blue:
    name: Deploy to Blue (Staging)
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      # OIDC: Authenticate to AWS using OIDC (no credentials needed)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.GITHUB_OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create Blue Task Definition
        run: |
          cat > datapulse-task-def-blue.json << 'EOF'
          {
            "family": "datapulse-task-blue",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "256",
            "memory": "512",
            "executionRoleArn": "${{ secrets.ECS_EXECUTION_ROLE }}",
            "containerDefinitions": [
              {
                "name": "backend",
                "image": "${{ env.ECR_REGISTRY }}/datapulse-backend:${{ github.sha }}",
                "essential": true,
                "secrets": [
                  {
                    "name": "DATABASE_URL",
                    "valueFrom": "${{ secrets.ECS_SECRET_ARN }}:DATABASE_URL::"
                  },
                  {
                    "name": "SECRET_KEY",
                    "valueFrom": "${{ secrets.ECS_SECRET_ARN }}:SECRET_KEY::"
                  }
                ],
                "portMappings": [
                  {"containerPort": 8000, "protocol": "tcp"}
                ]
              }
            ]
          }
          EOF

      - name: Register Blue Task Definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://datapulse-task-def-blue.json

      - name: Deploy to Blue Service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service datapulse-service-blue \
            --task-definition datapulse-task-blue \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services datapulse-service-blue

  # Green Environment Deployment (Production)
  deploy-green:
    name: Deploy to Green (Production)
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'

    steps:
      # OIDC: Authenticate to AWS using OIDC (no credentials needed)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.GITHUB_OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create Green Task Definition
        run: |
          cat > datapulse-task-def-green.json << 'EOF'
          {
            "family": "datapulse-task-green",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "512",
            "memory": "1024",
            "executionRoleArn": "${{ secrets.ECS_EXECUTION_ROLE }}",
            "containerDefinitions": [
              {
                "name": "backend",
                "image": "${{ env.ECR_REGISTRY }}/datapulse-backend:${{ github.sha }}",
                "essential": true,
                "secrets": [
                  {
                    "name": "DATABASE_URL",
                    "valueFrom": "${{ secrets.ECS_SECRET_ARN }}:DATABASE_URL::"
                  },
                  {
                    "name": "SECRET_KEY",
                    "valueFrom": "${{ secrets.ECS_SECRET_ARN }}:SECRET_KEY::"
                  }
                ],
                "portMappings": [
                  {"containerPort": 8000, "protocol": "tcp"}
                ]
              }
            ]
          }
          EOF

      - name: Register Green Task Definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://datapulse-task-def-green.json

      - name: Deploy to Green Service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service datapulse-service-green \
            --task-definition datapulse-task-green \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services datapulse-service-green

      - name: Switch ALB to Green
        run: |
          aws elbv2 modify-listener \
            --listener-arn ${{ secrets.ALB_LISTENER_ARN }} \
            --default-actions Type=forward,TargetGroupArn=${{ secrets.GREEN_TARGET_GROUP_ARN }}

  # Rollback on failure
  rollback:
    name: Rollback on Failure
    needs: [deploy-blue, deploy-green]
    runs-on: ubuntu-latest
    if: failure()

    steps:
      # OIDC: Authenticate to AWS using OIDC (no credentials needed)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.GITHUB_OIDC_ROLE }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback deployment
        run: |
          echo "Deployment failed! Initiating rollback..."

          # Get previous stable task definition
          PREVIOUS_TASK=$(aws ecs list-task-definitions \
            --family-prefix datapulse-task \
            --status ACTIVE \
            --sort DESC \
            --query 'taskDefinitionArns[1]' \
            --output text)

          if [ -n "$PREVIOUS_TASK" ]; then
            aws ecs update-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service datapulse-service \
              --task-definition $PREVIOUS_TASK \
              --force-new-deployment
            echo "Rolled back to previous task definition"
          fi
