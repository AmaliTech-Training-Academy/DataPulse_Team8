name: Deploy to ECS

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  # OIDC Role ARN - replace with your actual role ARN from Terraform output
  # Format: arn:aws:iam::ACCOUNT_ID:role/github-actions-deploy-ENVIRONMENT
  GITHUB_OIDC_ROLE: ${{ secrets.GITHUB_OIDC_ROLE_ARN }}

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "name=prod" >> $GITHUB_OUTPUT
            echo "cluster=datapulse-prod" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
            echo "cluster=datapulse-dev" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::384747604241:role/github-actions-deploy-${{ steps.env.outputs.name }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build backend
          docker build -t $ECR_REGISTRY/datapulse/backend:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/datapulse/backend:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/datapulse/backend:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update environment in task-definition.json
        run: |
          ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          ACCOUNT_ID="${ACCOUNT_ID:-384747604241}"
          sed -i "s/384747604241/$ACCOUNT_ID/g" terraform/task-definition.json
          sed -i "s/-prod/-${{ steps.env.outputs.name }}/g" terraform/task-definition.json
          # Note: Hostname also changes if it's environment-based
          sed -i "s/datapulse-postgres-prod/datapulse-postgres-${{ steps.env.outputs.name }}/g" terraform/task-definition.json

      - name: Render Amazon ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: terraform/task-definition.json
          container-name: backend
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: datapulse-backend-blue-${{ steps.env.outputs.name }}
          cluster: ${{ steps.env.outputs.cluster }}
          wait-for-service-stability: true
          # Note: If service uses CODE_DEPLOY, this action will use CodeDeploy if codedeploy-app is provided
          codedeploy-app: datapulse-backend-${{ steps.env.outputs.name }}
          codedeploy-deployment-group: datapulse-backend-dg-${{ steps.env.outputs.name }}
          codedeploy-appspec: terraform/appspec.yml
