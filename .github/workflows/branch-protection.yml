# Branch Protection Workflow
# This workflow prevents direct pushes to main branch
# Only merges via Pull Requests are allowed

name: Branch Protection

on:
  push:
    branches: [main]

jobs:
  protect-main:
    runs-on: ubuntu-latest
    steps:
      - name: Check if push is from PR
        if: github.event_name != 'pull_request'
        run: |
          echo "❌ Direct push to 'main' is not allowed!"
          echo "Please create a Pull Request to merge changes into 'main'"
          echo "You can create a PR at: https://github.com/${{ github.repository }}/pull/new/main"
          exit 1
