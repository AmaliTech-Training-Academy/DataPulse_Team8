# Branch Protection Workflow
# This workflow prevents direct pushes to main, developer, and develop branches
# Only merges via Pull Requests are allowed

name: Branch Protection

on:
  push:
    branches: [main, developer, develop]

jobs:
  protect-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Check if push is from PR
        if: github.event_name != 'pull_request'
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "❌ Direct push to '$BRANCH_NAME' is not allowed!"
          echo "Please create a Pull Request to merge changes into '$BRANCH_NAME'"
          echo "You can create a PR at: https://github.com/${{ github.repository }}/pull/new/$BRANCH_NAME"
          exit 1
